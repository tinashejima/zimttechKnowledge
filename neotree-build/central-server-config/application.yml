     # Development-specific security configuration
    notification:
        email:
            # In dev mode, send all security emails to the developer
            security-admin: developer@example.com
            security-team: developer@example.com
            # Disable email in dev mode by default
            enabled: false
        sms:
            enabled: false
        app:
            enabled: true
            
    # Security alerting configuration for development
    security:
        alert:
            # Lower thresholds for development to make testing easier
            threshold:
                login-failure: 2
                patient-record-access: 10
                api-call-rate: 20
                geo-location-distance: 100
                session-hijacking: 2
                behavior-anomaly: 50
            cooldown-minutes: 5
            working-hours-start: "07:00"
            working-hours-end: "19:00"
            enable-threat-intelligence: true
        incident:
            response:
                # Disable potentially disruptive automated responses in dev mode
                enable-account-lockout: false
                enable-ip-blocking: false
                enable-forensic-mode: true
            # Shorter auto-resolve period for development
            auto-resolve-days: 7


