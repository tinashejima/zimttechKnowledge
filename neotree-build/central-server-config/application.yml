# ===================================================================
# Axon
# ===================================================================

axon:
    amqp:
        exchange: amq.fanout

    eventhandling:
        processors:
            view:
                mode: subscribing #tracking
                source: eventBus
            report:
                mode: subscribing #tracking  
                source: eventBus

# ===================================================================
# Graphql
# ===================================================================
        
graphql:
    servlet:
        mapping: /api/graphql
        enabled: true
        corsEnabled: true
    subscriptions:
        websocket:
            path: /subscriptions   

graphiql:
    mapping: /graphiql
    endpoint: ${graphql.servlet.mapping}
    enabled: true
    pageTitle: Mrs Query Interface
          
